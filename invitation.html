<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="robots" content="noindex, nofollow">
<title>Invitation</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,500&family=Great+Vibes&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#4a3b2a;
    --gold:#b08d3f;
    --paper:#f4ede1;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;padding:0;min-height:100%;
    background:radial-gradient(ellipse at top, #efe6d6 0%, #d9c9a8 100%);
    font-family:'Cormorant Garamond', serif;
    color:var(--ink);
  }
  .screen{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:24px;
    text-align:center;
  }
  .hidden{display:none !important;}

  /* ---- Cover screen ---- */
  #cover h1{
    font-family:'Great Vibes', cursive;
    font-size:clamp(2.2rem, 8vw, 3.4rem);
    color:var(--gold);
    margin:0 0 6px 0;
    font-weight:400;
  }
  #cover p{
    font-size:clamp(1rem, 3.6vw, 1.2rem);
    letter-spacing:0.03em;
    margin:0 0 34px 0;
    max-width:340px;
    line-height:1.5;
  }
  .btn{
    appearance:none;
    border:1px solid var(--gold);
    background:transparent;
    color:var(--gold);
    padding:14px 34px;
    font-family:'Cormorant Garamond', serif;
    font-size:1.05rem;
    letter-spacing:0.08em;
    text-transform:uppercase;
    border-radius:2px;
    cursor:pointer;
    transition:all .25s ease;
  }
  .btn:active{
    background:var(--gold);
    color:#fff;
  }
  .spinner{
    width:26px;height:26px;
    border:2px solid rgba(176,141,63,0.25);
    border-top-color:var(--gold);
    border-radius:50%;
    animation:spin .8s linear infinite;
    margin-bottom:14px;
  }
  @keyframes spin{to{transform:rotate(360deg);}}

  /* ---- Invitation screen ---- */
  #invite{
    padding:0;
    justify-content:flex-start;
    opacity:0;
    transition:opacity 1s ease;
  }
  #invite.show{opacity:1;}
  .card{
    position:relative;
    width:min(94vw, 460px);
    aspect-ratio:1238/1746;
    margin:24px auto;
    border-radius:6px;
    overflow:hidden;
    box-shadow:0 18px 50px rgba(0,0,0,0.28);
  }
  .card img{
    width:100%;height:100%;display:block;object-fit:cover;
  }
  .name-overlay{
    position:absolute;
    left:14%;
    width:72%;
    top:56.5%;
    text-align:center;
    color:#4a3b2a;
    font-family:'Cormorant Garamond', serif;
    font-style:italic;
    font-weight:600;
    font-size:clamp(0.85rem, 4.1vw, 1.28rem);
    letter-spacing:0.01em;
    line-height:1.1;
  }
  .sound-toggle{
    margin:4px 0 30px 0;
    background:none;border:none;
    color:var(--gold);
    font-family:'Cormorant Garamond', serif;
    font-size:0.95rem;
    letter-spacing:0.05em;
    text-decoration:underline;
    cursor:pointer;
  }

  /* ---- Expired screen ---- */
  #expired .icon{
    font-size:2.6rem;
    margin-bottom:10px;
    color:var(--gold);
  }
  #expired h2{
    font-weight:600;
    font-size:1.5rem;
    margin:0 0 10px 0;
  }
  #expired p{
    max-width:320px;
    line-height:1.5;
    font-size:1.05rem;
  }
</style>
</head>
<body>

<!-- Loading -->
<div class="screen" id="loading">
  <div class="spinner"></div>
  <p>Chargement de votre invitation…</p>
</div>

<!-- Cover / consent screen (required so audio can play) -->
<div class="screen hidden" id="cover">
  <h1>Valderine &amp; Jenner</h1>
  <p>Vous avez reçu une invitation personnelle.<br>Appuyez ci-dessous pour l'ouvrir.</p>
  <button class="btn" id="openBtn">Ouvrir mon invitation</button>
</div>

<!-- Invitation screen -->
<div class="screen" id="invite">
  <div class="card">
    <img src="assets/billet.jpg" alt="Faire-part de mariage">
    <div class="name-overlay" id="guestName"></div>
  </div>
  <button class="sound-toggle" id="soundBtn">🔊 Couper le son</button>
  <audio id="music" src="assets/music.mp3" loop preload="auto"></audio>
</div>

<!-- Invalid / expired screen -->
<div class="screen hidden" id="expired">
  <div class="icon">✦</div>
  <h2>Invitation indisponible</h2>
  <p id="expiredMsg">Ce lien n'est plus valide. Merci de contacter les mariés directement si vous pensez qu'il s'agit d'une erreur.</p>
</div>

<script>
(function(){
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');

  const show = (elId) => {
    ['loading','cover','invite','expired'].forEach(s => {
      document.getElementById(s).classList.add('hidden');
    });
    document.getElementById(elId).classList.remove('hidden');
  };

  if(!id){
    show('expired');
    return;
  }

  fetch('data/guests.json', {cache:'no-store'})
    .then(r => r.json())
    .then(guests => {
      const guest = guests[id];
      if(!guest){
        show('expired');
        return;
      }
      const now = new Date();
      const expires = new Date(guest.expires);
      if(now.getTime() > expires.getTime()){
        document.getElementById('expiredMsg').textContent =
          "Cette invitation a expiré le " +
          expires.toLocaleDateString('fr-FR', {day:'numeric', month:'long', year:'numeric'}) +
          " à " + expires.toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'}) + ".";
        show('expired');
        return;
      }

      // Valid guest, not expired: show cover with open button
      document.getElementById('guestName').textContent = guest.name;
      show('cover');

      document.getElementById('openBtn').addEventListener('click', function(){
        const audio = document.getElementById('music');
        audio.volume = 0.75;
        audio.play().catch(()=>{ /* ignore if blocked, invitation still shows */ });

        show('invite');
        requestAnimationFrame(()=>{
          document.getElementById('invite').classList.add('show');
        });
      });
    })
    .catch(()=> show('expired'));

  document.getElementById('soundBtn').addEventListener('click', function(){
    const audio = document.getElementById('music');
    const btn = this;
    if(audio.paused){
      audio.play();
      btn.textContent = '🔊 Couper le son';
    } else {
      audio.pause();
      btn.textContent = '🔈 Activer le son';
    }
  });
})();
</script>

</body>
</html>
